<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlauWeb Instant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #F7F4E9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: sans-serif;
      color: #1e293b;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      border: 4px solid #E4BAD4;
      padding: 40px 40px 36px;
      text-align: center;
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      background-color: #C490D1;
      border-radius: 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    h1 {
      font-size: 1.875rem;
      font-weight: 900;
      margin-bottom: 6px;
      letter-spacing: -0.025em;
    }
    h1 span { color: #C490D1; }

    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      font-weight: 500;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      height: 140px;
      border: 2px solid #E4BAD4;
      border-radius: 1rem;
      padding: 12px 14px;
      font-size: 0.8rem;
      font-family: monospace;
      color: #1e293b;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      background: #fdfbff;
      margin-bottom: 16px;
    }
    textarea:focus { border-color: #C490D1; }
    textarea::placeholder { color: #b0a0b8; }

    .status-box {
      background-color: rgba(246, 223, 235, 0.5);
      border: 2px solid rgba(228, 186, 212, 0.3);
      border-radius: 1rem;
      padding: 12px 16px;
      margin-bottom: 20px;
    }
    .status-label {
      display: block;
      font-size: 10px;
      font-weight: 900;
      color: #C490D1;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 3px;
    }
    .status-text {
      font-weight: 700;
      font-size: 0.875rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      width: 100%;
      background-color: #C490D1;
      color: white;
      font-weight: 900;
      padding: 16px;
      border-radius: 1rem;
      box-shadow: 0 10px 20px -5px rgba(196,144,209,0.5);
      border: none;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background-color 0.2s, transform 0.1s;
    }
    .btn:hover { background-color: #b37dc1; }
    .btn:active { transform: scale(0.97); }

    .footer {
      margin-top: 32px;
      opacity: 0.4;
    }
    .footer-line {
      width: 32px;
      height: 4px;
      background-color: #E4BAD4;
      margin: 0 auto 8px;
      border-radius: 9999px;
    }
    .footer p {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.025em;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="icon-wrapper">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none"
         viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
    </svg>
  </div>

  <h1>GlauWeb <span>Instant</span></h1>

  <p class="subtitle">
    Cole o código HTML abaixo e clique em salvar.<br/>
    O arquivo será gerado e baixado automaticamente.
  </p>

  <textarea id="htmlInput" placeholder="Cole aqui o código HTML gerado pela IA (Ctrl+V)..."></textarea>

  <div class="status-box">
    <span class="status-label">Status</span>
    <p class="status-text" id="status">Aguardando código...</p>
  </div>

  <button class="btn" onclick="processAndDownload()">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
      <path d="M8 2a1 1 0 000 2h2a1 1 0 100-2H8z" />
      <path d="M3 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H5a2 2 0 01-2-2V5z" />
    </svg>
    SALVAR COMO .HTML
  </button>

  <div class="footer">
    <div class="footer-line"></div>
    <p>Prof. Glauber Santiago — UFSCar</p>
  </div>

</div>

<script>
  const textarea = document.getElementById('htmlInput');
  const statusEl = document.getElementById('status');

  textarea.addEventListener('input', function () {
    const val = textarea.value.trim();
    if (!val) {
      statusEl.textContent = 'Aguardando código...';
    } else {
      statusEl.textContent = val.length + ' caracteres prontos para salvar.';
    }
  });

  function extractHTML(content) {
    var markdownRegex = /```(?:html)?\s*([\s\S]*?)```/i;
    var markdownMatch = content.match(markdownRegex);
    if (markdownMatch && markdownMatch[1]) {
      return markdownMatch[1].trim();
    }
    var firstTag = content.indexOf('<');
    var lastTag  = content.lastIndexOf('>');
    if (firstTag !== -1 && lastTag !== -1 && lastTag > firstTag) {
      return content.substring(firstTag, lastTag + 1).trim();
    }
    return content;
  }

  function processAndDownload() {
    var raw = textarea.value;

    if (!raw || raw.trim() === '') {
      statusEl.textContent = 'Cole um código antes de salvar.';
      textarea.focus();
      return;
    }

    var cleanedHTML = extractHTML(raw);

    if (!cleanedHTML.includes('<')) {
      statusEl.textContent = 'Nenhum código HTML identificado.';
      return;
    }

    var fileName = 'index';
    var titleMatch =
      cleanedHTML.match(/<title[^>]*>(.*?)<\/title>/i) ||
      cleanedHTML.match(/<h1[^>]*>(.*?)<\/h1>/i);

    if (titleMatch && titleMatch[1]) {
      fileName = titleMatch[1]
        .trim()
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]/gi, '_')
        .substring(0, 40);
    }

    var finalOutput = cleanedHTML;
    if (!cleanedHTML.toLowerCase().includes('<html')) {
      finalOutput = '<!DOCTYPE html>\n<html lang="pt-br">\n<head>\n<meta charset="UTF-8">\n<title>' + fileName + '</title>\n<style>body{font-family:sans-serif;padding:20px;line-height:1.6;}</style>\n</head>\n<body>\n' + cleanedHTML + '\n</body>\n</html>';
    }

    try {
      var blob = new Blob([finalOutput], { type: 'text/html;charset=utf-8' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href     = url;
      a.download = fileName + '.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      statusEl.textContent = 'Salvo com sucesso: ' + fileName + '.html ✅';
    } catch (err) {
      statusEl.textContent = 'Erro ao gerar o arquivo.';
    }
  }
</script>

</body>
</html>
